name: Deploy Server → Render

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Trigger Render redeploy

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('deploy',{}).get('id','ok'))"
